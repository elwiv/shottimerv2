[build]
  functions = "netlify/functions"

[[redirects]]
  from = "/api/guns/:id"
  to = "/.netlify/functions/guns-id"
  status = 200

[[redirects]]
  from = "/api/suppressors/:id"
  to = "/.netlify/functions/suppressors-id"
  status = 200

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200
