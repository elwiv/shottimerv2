<svg width="1024" height="1024" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="iconClip">
      <rect width="120" height="120" rx="26.4"/>
    </clipPath>
    <linearGradient id="bgC" x1="0" y1="0" x2="120" y2="120" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2a2a2a"/>
      <stop offset="100%" stop-color="#111111"/>
    </linearGradient>
    <radialGradient id="copperC" cx="40%" cy="36%" r="62%">
      <stop offset="0%" stop-color="#f0b84a"/>
      <stop offset="100%" stop-color="#8a4e10"/>
    </radialGradient>
  </defs>

  <g clip-path="url(#iconClip)">
    <!-- Background -->
    <rect width="120" height="120" fill="url(#bgC)"/>

    <!-- Scale to 78% and center — ~13px padding each side -->
    <g transform="translate(13.2, 13.2) scale(0.78)">

      <!-- Outer bolt ring -->
      <circle cx="60" cy="60" r="50" fill="#222222" stroke="#3a3a3a" stroke-width="1"/>

      <!-- 7 Locking lugs -->
      <g fill="#d8d8d8">
        <rect x="52" y="7" width="16" height="26" rx="4" transform="rotate(0 60 60)"/>
        <rect x="52" y="7" width="16" height="26" rx="4" transform="rotate(51.4 60 60)"/>
        <rect x="52" y="7" width="16" height="26" rx="4" transform="rotate(102.8 60 60)"/>
        <rect x="52" y="7" width="16" height="26" rx="4" transform="rotate(154.2 60 60)"/>
        <rect x="52" y="7" width="16" height="26" rx="4" transform="rotate(205.7 60 60)"/>
        <rect x="52" y="7" width="16" height="26" rx="4" transform="rotate(257.1 60 60)"/>
        <rect x="52" y="7" width="16" height="26" rx="4" transform="rotate(308.5 60 60)"/>
      </g>

      <!-- Bolt face — warm off-white -->
      <circle cx="60" cy="60" r="36" fill="#e0ddd8"/>

      <!-- Machined ring -->
      <circle cx="60" cy="60" r="30" fill="none" stroke="rgba(0,0,0,0.15)" stroke-width="1.5"/>

      <!-- Extractor — 3 o'clock -->
      <rect x="87" y="52" width="10" height="16" rx="2.5" fill="#1a1a1a"/>
      <path d="M87 55.5 L81 55.5 Q75.5 55.5 75.5 60 Q75.5 64.5 81 64.5 L87 64.5"
            fill="none" stroke="#333333" stroke-width="1.5" stroke-linecap="round"/>

      <!-- Primer pocket -->
      <circle cx="60" cy="60" r="19" fill="#141414" stroke="#333333" stroke-width="1"/>

      <!-- Firing pin — copper -->
      <circle cx="60" cy="60" r="9" fill="url(#copperC)"/>
      <circle cx="57" cy="57" r="2.5" fill="rgba(255,230,160,0.4)"/>

    </g>
  </g>
</svg>
